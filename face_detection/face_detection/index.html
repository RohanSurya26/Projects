<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentient | Advanced Face Analysis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Load face-api.js from CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Background Elements -->
        <div class="ambient-light"></div>
        
        <!-- Header / HUD -->
        <header class="hud-header">
            <div class="logo">SENTIENT <span class="version">v1.0</span></div>
            
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <!-- Sun Icon -->
                <svg class="icon sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- Moon Icon -->
                <svg class="icon moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>

            <div class="status-indicator">
                <span class="status-dot"></span>
                <span id="system-status">INITIALIZING...</span>
            </div>
        </header>

        <!-- Main Viewport -->
        <main class="viewport">
            <div class="video-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay"></canvas>
                
                <!-- Loading Overlay -->
                <div id="loader" class="loader-overlay">
                    <div class="spinner"></div>
                    <p>LOADING NEURAL MODELS...</p>
                </div>
            </div>
        </main>

        <!-- Stats Panel -->
        <aside class="stats-panel">
            <div class="stat-card">
                <h3>FACES DETECTED</h3>
                <div class="stat-value" id="face-count">0</div>
            </div>
            <div class="stat-card">
                <h3>DOMINANT EMOTION</h3>
                <div class="stat-value emotion" id="dominant-emotion">--</div>
            </div>
            <div class="stat-card">
                <h3>FPS</h3>
                <div class="stat-value small" id="fps-counter">0</div>
            </div>
        </aside>
    </div>
</body>
</html>
