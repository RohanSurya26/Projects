<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaskGuard AI | Face Mask Detection</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load face-api.js from CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="app.js?v=2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="logo-shield">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <h1>Mask<span class="highlight">Guard</span> AI</h1>
            </div>
            <div class="status-indicator">
                <div class="pulse-dot" id="system-status-dot"></div>
                <span id="system-status-text">Initializing AI...</span>
            </div>
        </header>

        <main>
            <div class="camera-container glass-panel">
                <div class="video-wrapper">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="overlay"></canvas>
                    <div class="loading-overlay" id="loading">
                        <div class="spinner"></div>
                        <p id="loading-text">Loading Model Weights...</p>
                    </div>
                </div>
            </div>

            <aside class="side-panel">
                <div class="tabs glass-card">
                    <button class="tab-btn active" data-target="tab-stats">Stats</button>
                    <button class="tab-btn" data-target="tab-logs">Logs</button>
                    <button class="tab-btn" data-target="tab-settings">Settings</button>
                </div>

                <div class="tab-content active" id="tab-stats">
                    <div class="glass-card stat-card">
                        <div class="stat-header">
                            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            <h3>Total Faces</h3>
                        </div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    
                    <div class="glass-card stat-card card-safe">
                        <div class="stat-header">
                            <svg class="stat-icon safe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                            <h3>Mask Detected</h3>
                        </div>
                        <div class="stat-value safe-text" id="stat-mask">0</div>
                        <div class="stat-bar bg-safe"><div class="fill" id="bar-mask" style="width: 0%"></div></div>
                    </div>

                    <div class="glass-card stat-card card-danger">
                        <div class="stat-header">
                            <svg class="stat-icon danger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            <h3>No Mask</h3>
                        </div>
                        <div class="stat-value danger-text" id="stat-nomask">0</div>
                        <div class="stat-bar bg-danger"><div class="fill" id="bar-nomask" style="width: 0%"></div></div>
                    </div>
                </div>

                <div class="tab-content" id="tab-logs">
                    <div class="logs-container glass-card">
                        <div class="logs-header">
                            <h3>Alert Logs</h3>
                            <span class="log-badge" id="log-count">0</span>
                        </div>
                        <div class="logs-scroll-area" id="logs-gallery">
                            <p class="empty-msg">No logs yet.</p>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="tab-settings">
                    <div class="settings-container glass-card">
                        <h3>Detection Settings</h3>
                        
                        <div class="setting-item">
                            <label>Confidence Threshold: <span class="highlight" id="conf-val">30%</span></label>
                            <input type="range" class="styled-range" id="setting-confidence" min="10" max="90" step="5" value="30">
                        </div>

                        <div class="setting-item">
                            <label>Mask Sensitivity: <span class="highlight" id="skin-val">15%</span></label>
                            <input type="range" class="styled-range" id="setting-skin" min="5" max="40" step="1" value="15">
                        </div>

                        <div class="setting-item toggle-item">
                            <label>Audio Alerts</label>
                            <label class="switch">
                                <input type="checkbox" id="setting-audio" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="controls glass-card">
                    <h3>Controls</h3>
                    <div class="control-buttons">
                        <button id="toggle-camera" class="btn primary" disabled>Start Camera</button>
                        <button id="manual-snapshot" class="btn secondary" disabled title="Take Snapshot">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                        </button>
                        <button id="flip-camera" class="btn secondary" disabled title="Flip Video">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                        </button>
                        <button id="fullscreen-btn" class="btn secondary" title="Fullscreen">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                        </button>
                    </div>
                </div>
            </aside>
        </main>
    </div>
</body>
</html>
